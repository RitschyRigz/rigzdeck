name: RigzDeck APK

# Baut die Android-App (WebView-Panel) in der Cloud und legt die fertige APK als Artefakt ab.
# Laeuft bei Aenderungen unter android/ oder von Hand ("Run workflow"). Kein lokales SDK noetig.

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keystore aus Secret (stabile Signatur -> Updates ohne Deinstallieren)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android/app/rigzdeck.keystore
            echo "Keystore geschrieben ($(wc -c < android/app/rigzdeck.keystore) Bytes) -> fester rigz-Key."
          else
            echo "Kein ANDROID_KEYSTORE_B64-Secret -> Standard-Debug-Key (instabil)."
          fi

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: SDK-Pakete installieren
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Gradle bereitstellen
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Debug-APK bauen
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: APK umbenennen
        run: cp android/app/build/outputs/apk/debug/app-debug.apk rigzdeck.apk

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: rigzdeck-apk
          path: rigzdeck.apk
          if-no-files-found: error
