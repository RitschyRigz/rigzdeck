name: RigzDeck APK

# Baut die Android-App (WebView-Panel) in der Cloud. Kein lokales SDK noetig.
# - Bei Aenderungen unter android/ oder manuell ("Run workflow"): APK als Artefakt (Download im Actions-Tab).
# - Bei einem VEROEFFENTLICHTEN GitHub-Release: die signierte APK wird automatisch ans Release gehaengt
#   (liegt dann dauerhaft neben der .exe auf der Releases-Seite, fuer Tablet-Installs).

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      bake_hosts:
        description: 'Persoenliche Standard-Hosts aus Secret PERSONAL_HOSTS_JSON einbrennen (nur fuer Taildrop, NIE ins Release/Repo)'
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: write   # noetig, um die APK als Release-Datei hochzuladen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keystore aus Secret (stabile Signatur -> Updates ohne Deinstallieren)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android/app/rigzdeck.keystore
            echo "Keystore geschrieben ($(wc -c < android/app/rigzdeck.keystore) Bytes) -> fester rigz-Key."
          else
            echo "Kein ANDROID_KEYSTORE_B64-Secret -> Standard-Debug-Key (instabil)."
          fi

      - name: Persoenliche Hosts einbrennen (nur manueller Build + Secret; nie ins Release/Repo)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bake_hosts == 'true' }}
        env:
          HOSTS: ${{ secrets.PERSONAL_HOSTS_JSON }}
        run: |
          if [ -z "$HOSTS" ]; then echo "Kein PERSONAL_HOSTS_JSON-Secret -> nichts eingebrannt."; exit 0; fi
          mkdir -p android/app/src/main/assets
          printf '%s' "$HOSTS" > android/app/src/main/assets/default_hosts.json
          echo "default_hosts.json eingebrannt ($(wc -c < android/app/src/main/assets/default_hosts.json) Bytes) -> seedet beim ersten Start."

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: SDK-Pakete installieren
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Gradle bereitstellen
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Debug-APK bauen
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: APK umbenennen
        run: cp android/app/build/outputs/apk/debug/app-debug.apk rigzdeck.apk

      - name: APK hochladen (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: rigzdeck-apk
          path: rigzdeck.apk
          if-no-files-found: error

      - name: APK ans Release haengen (nur bei Release)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VER="${TAG#v}"                       # v0.12.3 -> 0.12.3 (passend zur .exe-Benennung)
          cp rigzdeck.apk "RigzDeck-${VER}.apk"
          gh release upload "$TAG" "RigzDeck-${VER}.apk" --clobber
          echo "APK 'RigzDeck-${VER}.apk' an Release $TAG gehaengt."
